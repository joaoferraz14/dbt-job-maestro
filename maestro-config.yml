manifest_path: target/manifest.json
output_dir: .
selectors_output_file: selectors.yml
jobs_output_file: jobs.yml
selector:
  method: fqn
  group_by_dependencies: true
  exclude_tags:
    - product
    - udc
  exclude_models: []
  exclude_paths:
    - models/1_stage
  include_freshness_selectors: false
  freshness_selector_names: []
  include_parent_sources: true
  prefix_order: []
  path_grouping_level: 1
  min_models_per_selector: 1
  selector_prefix: bose
  warn_on_manual_overlaps: true
job:
  account_id: 123
  project_id: 444
  environment_id: 555
  dbt_version: ''
  threads: 8
  target_name: prod
  timeout_seconds: 0
  cron_schedule: 0 */6 * * *
  generate_docs: false
  run_generate_sources: false
  job_name_prefix: ae-dbt-bose
  orchestration_mode: cron_incremental
  start_hour: 6
  start_minute: 0
  cron_increment_minutes: 5
  cron_days_of_week: []
  cascade_initial_deployment: true
  job_id_mapping: {}
  include_maestro_selectors_in_jobs: true
  include_manual_selectors_in_jobs: true
  selector_prefix: bose
deployment:
  deploy_branch: main
  require_dbt_jobs_as_code: true
  dbt_project_path: .
