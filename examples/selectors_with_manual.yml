# Example selectors.yml showing manually created selectors
# These will be preserved when regenerating with method: mixed

selectors:
  # MANUALLY CREATED SELECTOR (will be preserved)
  # Mark it by including "manually_created" in the description
  - name: critical_revenue_models
    description: "manually_created - Critical revenue tracking models that must run first"
    definition:
      union:
        - method: fqn
          value: fct_revenue
          parents: true
        - method: fqn
          value: fct_subscriptions
          parents: true
        - method: tag
          value: revenue

  # MANUALLY CREATED SELECTOR (will be preserved)
  - name: experimental_features
    description: "manually_created - Experimental features under development"
    definition:
      union:
        - method: path
          value: models/marts/experimental
        - method: tag
          value: experimental

  # AUTO-GENERATED SELECTORS (will be regenerated)
  # These will be replaced during regeneration
  - name: tag_daily
    description: Selector for models tagged with daily
    definition:
      union:
        - method: tag
          value: daily

  - name: maestro_stg_customers
    description: Selector for models in component starting with stg_customers
    definition:
      union:
        - method: fqn
          value: stg_customers
        - method: fqn
          value: int_customer_orders
          parents: true
