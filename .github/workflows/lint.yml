name: Lint

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting with Black
        run: black --check --diff dbt_job_maestro/ tests/

      - name: Lint with Flake8
        run: flake8 dbt_job_maestro/ tests/ --max-line-length=100 --ignore=E501,W503

      - name: Type check with MyPy
        run: mypy dbt_job_maestro/ --ignore-missing-imports --no-error-summary || true
