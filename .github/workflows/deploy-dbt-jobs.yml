# GitHub Actions workflow for deploying dbt jobs with cascade mode support
# This workflow handles both simple deployment and two-phase cascade deployment
#
# For cascade mode, this implements a two-phase deployment:
# Phase 1: Deploy jobs with cron schedules, fetch job IDs from dbt Cloud API
# Phase 2: Regenerate jobs with cascade triggers using the fetched job IDs

name: Deploy DBT Jobs

on:
  push:
    branches:
      - main  # Change to your deployment branch
    paths:
      - 'jobs.yml'
      - 'selectors.yml'
      - 'config.yml'
      - '.github/workflows/deploy-dbt-jobs.yml'

jobs:
  deploy-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml requests
          pip install git+https://github.com/dbt-labs/dbt-jobs-as-code.git

      - name: Install dbt-job-maestro
        run: |
          pip install -e .

      - name: Check if cascade mode phase 1
        id: check-phase
        run: |
          # Check if job_id_mapping is empty in config.yml (indicates phase 1)
          python -c "
          import yaml
          with open('config.yml') as f:
              config = yaml.safe_load(f)

          orchestration_mode = config.get('job', {}).get('orchestration_mode', 'simple')
          cascade_initial = config.get('job', {}).get('cascade_initial_deployment', True)
          job_id_mapping = config.get('job', {}).get('job_id_mapping', {})

          is_phase1 = (orchestration_mode == 'cascade' and cascade_initial and not job_id_mapping)

          print(f'orchestration_mode={orchestration_mode}')
          print(f'is_cascade_phase1={is_phase1}')
          " >> $GITHUB_OUTPUT

      - name: Validate jobs.yml exists
        run: |
          if [ ! -f jobs.yml ]; then
            echo "❌ jobs.yml not found!"
            exit 1
          fi
          echo "✅ jobs.yml found"

      - name: Deploy jobs to dbt Cloud
        env:
          DBT_CLOUD_SERVICE_TOKEN: ${{ secrets.DBT_CLOUD_SERVICE_TOKEN }}
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
        run: |
          dbt-jobs-as-code sync-jobs jobs.yml
          echo "✅ Jobs deployed to dbt Cloud"

      # CASCADE MODE PHASE 1: Fetch job IDs and regenerate
      - name: Fetch job IDs from dbt Cloud (Cascade Phase 1)
        if: steps.check-phase.outputs.is_cascade_phase1 == 'True'
        env:
          DBT_API_TOKEN: ${{ secrets.DBT_API_TOKEN }}
        run: |
          # Extract account_id and project_id from config.yml
          ACCOUNT_ID=$(python -c "import yaml; print(yaml.safe_load(open('config.yml'))['job']['account_id'])")
          PROJECT_ID=$(python -c "import yaml; print(yaml.safe_load(open('config.yml'))['job']['project_id'])")

          echo "Fetching job IDs from dbt Cloud (Account: $ACCOUNT_ID, Project: $PROJECT_ID)..."
          python scripts/fetch_job_ids.py \
            --account-id "$ACCOUNT_ID" \
            --project-id "$PROJECT_ID" \
            --format yaml > job_ids.yml

          echo "✅ Job IDs fetched successfully"
          cat job_ids.yml

      - name: Update config with job IDs (Cascade Phase 1)
        if: steps.check-phase.outputs.is_cascade_phase1 == 'True'
        run: |
          python scripts/update_config_with_job_ids.py \
            --config config.yml \
            --job-ids job_ids.yml \
            --disable-initial-deployment

          echo "✅ Config updated with job IDs"

      - name: Regenerate jobs with cascade triggers (Cascade Phase 1)
        if: steps.check-phase.outputs.is_cascade_phase1 == 'True'
        run: |
          dbt-job-maestro generate-jobs
          echo "✅ Jobs regenerated with cascade triggers"

      - name: Redeploy jobs with cascade triggers (Cascade Phase 1)
        if: steps.check-phase.outputs.is_cascade_phase1 == 'True'
        env:
          DBT_CLOUD_SERVICE_TOKEN: ${{ secrets.DBT_CLOUD_SERVICE_TOKEN }}
        run: |
          dbt-jobs-as-code sync-jobs jobs.yml
          echo "✅ Jobs redeployed with cascade triggers"

      - name: Commit updated config (Cascade Phase 1)
        if: steps.check-phase.outputs.is_cascade_phase1 == 'True'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add config.yml jobs.yml
          git commit -m "chore: update config with job IDs for cascade mode [skip ci]" || echo "No changes to commit"
          git push

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

          if [ "${{ steps.check-phase.outputs.is_cascade_phase1 }}" == "True" ]; then
            echo "✅ Cascade mode: Phase 1 completed (job IDs fetched and configured)"
            echo "ℹ️  Config updated and committed with job_id_mapping"
          elif [ "${{ steps.check-phase.outputs.orchestration_mode }}" == "cascade" ]; then
            echo "✅ Cascade mode: Phase 2 (jobs deployed with cascade triggers)"
          else
            echo "✅ Standard deployment mode"
          fi
